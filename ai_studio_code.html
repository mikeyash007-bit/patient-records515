    function searchPatient() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const resultsContainer = document.getElementById('resultArea');
        resultsContainer.innerHTML = "";

        if (query === "") return;

        const filtered = patientData.filter(p => p.Name.toLowerCase().includes(query));

        if (filtered.length > 0) {
            filtered.forEach(patient => {
                const card = document.createElement('div');
                card.className = 'patient-card';
                
                let content = "";
                for (const [key, value] of Object.entries(patient)) {
                    content += `
                        <div class="data-item">
                            <span class="label">${key}</span>
                            <span class="value">${value || 'N/A'}</span>
                        </div>
                    `;
                }
                card.innerHTML = content;
                resultsContainer.appendChild(card);
            });
        } else {
            resultsContainer.innerHTML = `<p class="no-results">No patient found with the name "${query}". Please check the spelling.</p>`;
        }
    }
